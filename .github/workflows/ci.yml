name: Java CI with Maven + Coverage + tsDetect

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Java 21
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build, test and coverage
      run: mvn clean verify jacoco:report
      continue-on-error: true

    - name: Copy Surefire reports to repo per test class
      run: |
        mkdir -p reports/surefire

        if [ -d target/surefire-reports ]; then
          for file in target/surefire-reports/TEST-*.xml; do
            filename=$(basename "$file")
            cp "$file" "reports/surefire/$filename"
            echo "Copied $filename"
          done
        else
          echo "Surefire reports not found, skipping copy"
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add reports/surefire || echo "Nothing to add"
        git diff --cached --quiet || git commit -m "Update Surefire reports"
        git push || echo "Nothing to push"

    - name: Extract test failures per test class
      id: testfail
      run: |
        mkdir -p reports
        SUMMARY_FILE="reports/tests-summary.csv"
        echo "test,failures,coverage,smells" > "$SUMMARY_FILE"

        sudo apt-get update
        sudo apt-get install -y libxml2-utils

        for file in target/surefire-reports/TEST-*.xml; do
            classname=$(basename "$file" .xml)
            failures=$(xmllint --xpath "string(//testsuite/@failures)" "$file")
            classname=${classname#TEST-}
            echo "$classname,$failures,0,0" >> "$SUMMARY_FILE"
            echo "${classname}_failures=$failures" >> $GITHUB_OUTPUT
        done

    - name: Parse JaCoCo CSV and get per-class coverage
      id: coverage
      run: |
        echo "Parsing JaCoCo CSV..."

        CSV_FILE="target/site/jacoco/jacoco.csv"
        SUMMARY_FILE="reports/tests-summary.csv"

        if [ ! -f "$SUMMARY_FILE" ]; then
          echo "test,failures,coverage,smells" > "$SUMMARY_FILE"
        fi

        if [ -f "$CSV_FILE" ]; then
          tail -n +2 "$CSV_FILE" | while IFS=',' read -r group package classname instr_missed instr_covered branch_missed branch_covered line_missed line_covered complexity_missed complexity_covered method_missed method_covered; do
            if [[ -n "$instr_missed" && -n "$instr_covered" ]]; then
              percent=$(( instr_covered * 100 / (instr_covered + instr_missed) ))
              echo "$classname coverage: $percent%"

              echo "${classname}_coverage=$percent" >> $GITHUB_OUTPUT

              classname="${classname}Test"

              if grep -q "^$classname," "$SUMMARY_FILE"; then
                  sed -i "s/^\($classname,[^,]*,\)[^,]*/\1$percent/" "$SUMMARY_FILE"
              else
                  echo "$classname,0,$percent,0" >> "$SUMMARY_FILE"
              fi
            fi
          done
        else
          echo "jacoco.csv not found, skipping coverage per class"
        fi

        mkdir -p coverage/jacoco
        if [ -f target/site/jacoco/jacoco.csv ]; then
          cp target/site/jacoco/jacoco.csv coverage/jacoco/jacoco.csv
        else
          echo "jacoco.csv not found, skipping copy"
        fi
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add coverage/jacoco/jacoco.csv || echo "Nothing to add"
        git diff --cached --quiet || git commit -m "Update JaCoCo coverage report"
        git push || echo "Nothing to push"

    - name: Run tsDetect and save output
      id: tsdetect
      run: |
        echo "Generating tsDetect input.csv..."

        PROJECT_NAME=STProject
        INPUT_FILE=tools/tsdetect/input.csv

        rm -f $INPUT_FILE
        touch $INPUT_FILE

        find src/test/java -name "*Test.java" | while read testfile; do
          classname=$(basename "$testfile" Test.java)
          prodfile=$(find src/main/java -name "$classname.java" | head -n 1)

          if [ -n "$prodfile" ]; then
            echo "$PROJECT_NAME,$testfile,$prodfile" >> $INPUT_FILE
          fi
        done

        echo "Final input.csv:"
        cat $INPUT_FILE

        SUMMARY_FILE="reports/tests-summary.csv"

        rm -f tools/tsdetect/output.csv
        java -jar tools/tsdetect/TestSmellDetector.jar tools/tsdetect/input.csv
        GENERATED_FILE=$(ls -1t Output_TestSmellDetection_*.csv | head -n 1)
        if [ -f "$GENERATED_FILE" ]; then
          mv "$GENERATED_FILE" tools/tsdetect/output.csv
          echo "tsDetect output file: tools/tsdetect/output.csv"

          tail -n +2 tools/tsdetect/output.csv | while IFS=',' read -r project testfile prodfile rest; do
            classname=$(basename "$testfile" .java)
            TS_SMELLS=$(echo "$rest" | awk -F',' '{sum=0; for(i=1;i<=NF;i++){gsub(/ /,"",$i); sum+=$i} print sum}')
            echo "$classname smells: $TS_SMELLS"

            if grep -q "^$classname," "$SUMMARY_FILE"; then
              sed -i "s/^\($classname,[^,]*,[^,]*,\)[^,]*/\1$TS_SMELLS/" "$SUMMARY_FILE"
            else
              echo "$classname,0,0,$TS_SMELLS" >> "$SUMMARY_FILE"
            fi

            echo "${classname}_smells=$TS_SMELLS" >> $GITHUB_OUTPUT
          done

        else
          echo "No tsDetect output file found!"
          echo "ts_smells=0" >> $GITHUB_OUTPUT
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add tools/tsdetect/output.csv
        git diff --cached --quiet || git commit -m "Update tsDetect output"
        git push origin HEAD

    - name: Update README.md with coverage and results per test
      run: |
        echo "Updating README.md for each test class..."

        sed -i '/^## Test Classes$/,$d' README.md
        echo "## Test Classes" >> README.md

        SUMMARY_FILE="reports/tests-summary.csv"

        if [ -f "$SUMMARY_FILE" ]; then
          tail -n +2 "$SUMMARY_FILE" | while IFS=',' read -r test failures coverage smells; do

            echo "### $test" >> README.md

            if [ "$failures" -eq 0 ]; then
              echo "- Coverage: $coverage%" >> README.md
              echo "- Test Smells: $smells" >> README.md
              echo "- Risultato: Tutti i test passati!" >> README.md
            else
              echo "- Coverage: $coverage%" >> README.md
              echo "- Test Smells: $smells" >> README.md
              echo "- Risultato: $failures test falliti" >> README.md
            fi

            echo "" >> README.md

          done
        else
          echo "## Test Classes" >> README.md
          echo "_Nessun dato disponibile_" >> README.md
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git commit -m "Update coverage and test smells per test class [skip ci]" || echo "No changes"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

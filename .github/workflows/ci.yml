name: Java CI with Maven + Coverage + tsDetect

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Java 21
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build, test and coverage
      run: mvn clean verify jacoco:report
      continue-on-error: true

    - name: Copy Surefire reports to repo
      run: |
        mkdir -p reports/surefire
        if [ -d target/surefire-reports ]; then
          cp -R target/surefire-reports/* reports/surefire/
        else
          echo "Surefire reports not found, skipping copy"
        fi
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add reports/surefire || echo "Nothing to add"
        git diff --cached --quiet || git commit -m "Update Surefire reports"
        git push || echo "Nothing to push"

    - name: Extract test failures
      id: testfail
      run: |
        sudo apt-get update && sudo apt-get install -y libxml2-utils
        FAILURES=$(xmllint --xpath "sum(//testsuite/@failures)" target/surefire-reports/TEST-*.xml)
        echo "failures=$FAILURES" >> $GITHUB_OUTPUT

    - name: Parse JaCoCo XML and get coverage %
      id: coverage
      run: |
        echo "Parsing JaCoCo XML..."
        if [ -f target/site/jacoco/jacoco.xml ]; then
          COVERAGE=$(xmllint --xpath "string(//report/counter[@type='INSTRUCTION']/@covered)" target/site/jacoco/jacoco.xml)
          TOTAL=$(xmllint --xpath "string(//report/counter[@type='INSTRUCTION']/@missed)" target/site/jacoco/jacoco.xml)
          PERCENT=$((COVERAGE * 100 / (COVERAGE + TOTAL)))
        else
          echo "jacoco.xml not found, setting coverage to 0"
          PERCENT=0
        fi
        echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

    - name: Copy jacoco.csv to repo
      run: |
        mkdir -p coverage/jacoco
        if [ -f target/site/jacoco/jacoco.csv ]; then
          cp target/site/jacoco/jacoco.csv coverage/jacoco/jacoco.csv
        else
          echo "jacoco.csv not found, skipping copy"
        fi
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add coverage/jacoco/jacoco.csv || echo "Nothing to add"
        git diff --cached --quiet || git commit -m "Update JaCoCo coverage report"
        git push || echo "Nothing to push"

    - name: Run tsDetect and save output
      id: tsdetect
      run: |
        rm -f tools/tsdetect/output.csv
        java -jar tools/tsdetect/TestSmellDetector.jar tools/tsdetect/input.csv
        GENERATED_FILE=$(ls -1t Output_TestSmellDetection_*.csv | head -n 1)
        if [ -f "$GENERATED_FILE" ]; then
          mv "$GENERATED_FILE" tools/tsdetect/output.csv
          echo "tsDetect output file: tools/tsdetect/output.csv"
          TS_SMELLS=$(tail -n +2 tools/tsdetect/output.csv | awk -F',' '{for(i=8;i<=NF;i++){gsub(/ /,"",$i); sum+=$i}} END{print sum}')
          echo "TS smells found: $TS_SMELLS"
          echo "ts_smells=$TS_SMELLS" >> $GITHUB_OUTPUT

        else
          echo "No tsDetect output file found!"
          echo "ts_smells=0" >> $GITHUB_OUTPUT
        fi
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add tools/tsdetect/output.csv
        git diff --cached --quiet || git commit -m "Update tsDetect output"
        git push origin HEAD

    - name: Update README.md with coverage and results
      run: |
        echo "Updating README.md..."

        sed -i "s|^\*\*Coverage:\*\*.*|**Coverage:** ${{ steps.coverage.outputs.coverage }}%|" README.md
        sed -i "s|^\*\*Test Smells:\*\*.*|**Test Smells:** ${{ steps.tsdetect.outputs.ts_smells }}|" README.md

        if [ "${{ steps.testfail.outputs.failures }}" -eq 0 ]; then
          sed -i "s|^\*\*Test Results:\*\*.*|**Test Results:** Tutti i test passati!|" README.md
        else
          sed -i "s|^\*\*Test Results:\*\*.*|**Test Results:**  ${{ steps.testfail.outputs.failures }} test falliti..|" README.md
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git commit -m "Update coverage and test smells [skip ci]" || echo "No changes"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main



name: Java CI with Maven + Coverage + tsDetect

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Java 21
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build project
      run: mvn clean compile

    - name: Run tests with coverage
      run: mvn clean verify jacoco:report
      continue-on-error: true

    - name: Extract test failures
      id: testfail
      run: |
        FAILURES=$(grep -R "Failures:" target/surefire-reports | awk '{sum += $2} END {print sum+0}')
        echo "failures=$FAILURES" >> $GITHUB_OUTPUT

    - name: Install xmllint
      run: sudo apt-get update && sudo apt-get install -y libxml2-utils

    - name: Parse JaCoCo XML and get coverage %
      id: coverage
      run: |
        echo "Parsing JaCoCo XML..."
        COVERAGE=$(xmllint --xpath "string(//report/counter[@type='INSTRUCTION']/@covered)" target/site/jacoco/jacoco.xml)
        TOTAL=$(xmllint --xpath "string(//report/counter[@type='INSTRUCTION']/@missed)" target/site/jacoco/jacoco.xml)
        PERCENT=$((COVERAGE * 100 / (COVERAGE + TOTAL)))
        echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

    - name: Run tsDetect
      run: |
        > tools/tsdetect/output.csv
        java -jar tools/tsdetect/TestSmellDetector.jar \
        tools/tsdetect/input.csv \
        tools/tsdetect/output.csv
      
    - name: Calculate test smells
      id: tsdetect
      run: |
        OUTPUT_FILE=$(ls -t target/tsdetect-output/Output_TestSmellDetection_*.csv | head -n 1)
        TS_SMELLS=$(tail -n +2 "$OUTPUT_FILE" | awk -F, '{sum=0; for(i=8;i<=NF;i++) sum+=$i; total+=sum} END{print total}')
        echo "ts_smells=$TS_SMELLS" >> $GITHUB_OUTPUT

    - name: Update README.md with coverage and results
      run: |
        echo "Updating README.md..."

        sed -i "s|^\*\*Coverage:\*\*.*|**Coverage:** ${{ steps.coverage.outputs.coverage }}%|" README.md
        sed -i "s|^\*\*Test Smells:\*\*.*|**Test Smells:** ${{ steps.tsdetect.outputs.ts_smells }}|" README.md

        if [ "${{ steps.testfail.outputs.failures }}" -eq 0 ]; then
          sed -i "s|^\*\*Test Results:\*\*.*|**Test Results:** All tests passed ✅|" README.md
        else
          sed -i "s|^\*\*Test Results:\*\*.*|**Test Results:** ❌ ${{ steps.testfail.outputs.failures }} test failed|" README.md
        fi

    - name: Debug workflow outputs
      run: |
        echo "=== DEBUG OUTPUTS ==="
        echo "Coverage: ${{ steps.coverage.outputs.coverage }}"
        echo "Test Smells: ${{ steps.tsdetect.outputs.ts_smells }}"
        echo "Test Failures: ${{ steps.testfail.outputs.failures }}"

    - name: Commit README update
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git commit -m "Update coverage and test smells [skip ci]" || echo "No changes"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main


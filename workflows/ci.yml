name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Java 21
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build project
      run: mvn clean compile

    - name: Run tests with coverage
      run: mvn test

    - name: Upload JaCoCo coverage report
      uses: actions/upload-artifact@v3
      with:
        name: jacoco-report
        path: target/site/jacoco

    - name: Run tsDetect via Docker
      run: |
        docker run --rm -v ${{ github.workspace }}:/app your-tsdetect-image /app

    - name: Upload tsDetect report
      uses: actions/upload-artifact@v3
      with:
        name: tsdetect-report
        path: target/tsdetect-output

